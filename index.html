// ── Interpretation logic ──────────────────────────────────────────────────────
function interpret(metrics, prs, bugs) {
  const insights = [];
  const avgReviewWait = prs.length ? prs.reduce((a,b) => a+b.reviewWaitHours,0)/prs.length : 0;
  const avgLines = prs.length ? prs.reduce((a,b) => a+b.linesChanged,0)/prs.length : 0;
  if (metrics.bugRate === 0 && metrics.avgLeadTime <= 3.5 && metrics.avgCycleTime <= 4.5)
    insights.push({ type:'positive', text:'Zero escaped bugs combined with fast delivery — this is the ideal combination. Keep PR sizes manageable to sustain this.' });
  else if (metrics.pattern === 'Healthy flow')
    insights.push({ type:'positive', text:'Your delivery flow is healthy this month — work is moving from start to production without major blockages.' });
  if (metrics.avgLeadTime > 4)
    insights.push({ type:'warn', text:`Lead time of ${metrics.avgLeadTime.toFixed(1)} days means changes are taking a while to reach users after the PR is opened. There may be deployment queue or CI delays after merge.` });
  if (metrics.avgCycleTime > 5)
    insights.push({ type:'warn', text:`Cycle time of ${metrics.avgCycleTime.toFixed(1)} days suggests tickets stay in-progress longer than ideal. Breaking stories into smaller sub-tasks often helps.` });
  if (avgReviewWait > 20)
    insights.push({ type:'warn', text:`PRs are waiting ~${Math.round(avgReviewWait)}h for a first review. This delay happens before your code even starts moving through CI/CD — it's compressing your lead time headroom.` });
  if (avgLines > 500)
    insights.push({ type:'warn', text:`PRs average ${Math.round(avgLines)} lines changed. Large diffs slow reviewers and make bugs harder to spot. Aim to keep PRs under 400 lines.` });
  if (metrics.bugRate > 0) {
    const causes = [...new Set(bugs.map(b => b.rootCause))].join(', ');
    insights.push({ type:'danger', text:`${metrics.escapedBugs} bug${metrics.escapedBugs>1?'s':''} escaped to production this month (root cause${bugs.length>1?'s':''}: ${causes}). Bug rate is ${metrics.bugRate} — investigate before it compounds.` });
  }
  return insights;
}

function getNextSteps(metrics, prs) {
  const steps = [];
  const avgReviewWait = prs.length ? prs.reduce((a,b) => a+b.reviewWaitHours,0)/prs.length : 0;
  const avgLines = prs.length ? prs.reduce((a,b) => a+b.linesChanged,0)/prs.length : 0;
  if (avgReviewWait > 20)
    steps.push({ action:'Tag reviewers immediately after opening a PR', detail:`Your average review wait is ${Math.round(avgReviewWait)}h. Don't wait for reviewers to notice — a quick Slack ping when you open cuts this in half.` });
  if (avgLines > 400)
    steps.push({ action:'Split large PRs before submitting', detail:`Your PRs average ${Math.round(avgLines)} lines. Try splitting by logical concern: data layer, API, UI. Smaller PRs merge faster and get better feedback.` });
  if (metrics.bugRate > 0)
    steps.push({ action:'Add a pre-merge self-review step', detail:"Walk through your own diff with fresh eyes before tagging reviewers. Catching one edge case yourself avoids a production incident and builds reviewer trust." });
  if (metrics.avgLeadTime > 4)
    steps.push({ action:'Investigate what happens after merge', detail:`Lead time is ${metrics.avgLeadTime.toFixed(1)} days but cycle time is only ${metrics.avgCycleTime.toFixed(1)} days. The gap suggests post-merge delays — check CI queue times and deployment windows.` });
  if (steps.length === 0) {
    steps.push({ action:'Keep the momentum going', detail:"Your metrics are solid. The next step is helping teammates — your cycle time and quality numbers are worth sharing as a workflow example." });
    steps.push({ action:'Document your testing approach', detail:"Zero escaped bugs this month is a quality signal. Write down the quick checks you do before merging — it builds team standards." });
  }
  return steps.slice(0, 3);
}

      e('div',{style:{marginBottom:8}},e(SectionHeader,{title:'The 5 metrics this month',sub:'Calculated from Fact_Pull_Requests, Fact_Jira_Issues, Fact_CI_Deployments, Fact_Bug_Reports'})),
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:16}},
        e(MetricTile,{label:'Lead time for changes',value:metrics.avgLeadTime.toFixed(1),unit:'days',sub:'PR open → prod deployment',color:metrics.avgLeadTime>4?C.warn:C.accent,explain:'Avg lead_time_days from successful prod deployments. Speed from PR open to user impact.'}),
        e(MetricTile,{label:'Cycle time',value:metrics.avgCycleTime.toFixed(1),unit:'days',sub:'In Progress → Done',color:metrics.avgCycleTime>5.5?C.warn:C.accent,explain:'Avg cycle_time_days from Jira issues done this month. Shows how fast active work moves.'}),
        e(MetricTile,{label:'PR throughput',value:metrics.mergedPRs,unit:'PRs',sub:'Merged this month',color:C.info,explain:'Count of merged pull requests. Useful as an activity signal — read with quality and speed metrics.'}),
        e(MetricTile,{label:'Deployment freq.',value:metrics.prodDeploys,unit:'deploys',sub:'Successful prod releases',color:C.info,explain:'Count of successful prod deployments. More frequent safe releases = healthier delivery loop.'}),
        e(MetricTile,{label:'Bug rate',value:metrics.bugRate.toFixed(1),unit:'',sub:`${metrics.escapedBugs} escaped / ${metrics.issuesDone} issues done`,color:metrics.bugRate>0?C.danger:C.accent,explain:'Escaped prod bugs ÷ issues completed. Shows whether delivery speed is hurting quality.'})
      ),
      // PR breakdown
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}},
        e(MetricTile,{label:'Avg review wait',value:avgReviewWait,unit:'hrs',sub:'PR open → first reviewer',color:parseFloat(avgReviewWait)>20?C.warn:C.sub,explain:'How long code waits before a reviewer looks. A key hidden bottleneck in lead time.'}),
        e(MetricTile,{label:'Avg PR size',value:avgLines,unit:'lines',sub:'Lines changed per PR',color:avgLines>500?C.warn:C.sub,explain:'Larger PRs slow reviewers and are correlated with more escaped bugs.'})
      ),
      // Trend
      history.length > 1 && e(Card,{style:{marginBottom:24}},
        e(SectionHeader,{title:'Trend: lead time vs cycle time',sub:'Month-over-month comparison'}),
        e(ResponsiveContainer,{width:'100%',height:170},
          e(LineChart,{data:trendData,margin:{top:4,right:8,bottom:0,left:-20}},
            e(CartesianGrid,{stroke:C.border,strokeDasharray:'3 3'}),
            e(XAxis,{dataKey:'month',tick:{fill:C.muted,fontSize:11}}),
            e(YAxis,{tick:{fill:C.muted,fontSize:11},unit:'d'}),
            e(Tooltip,{contentStyle:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12},formatter:(v,n)=>[`${v.toFixed(2)} days`,n==='leadTime'?'Lead time':'Cycle time']}),
            e(Line,{type:'monotone',dataKey:'leadTime',stroke:C.accent,strokeWidth:2,dot:{fill:C.accent,r:4},name:'leadTime'}),
            e(Line,{type:'monotone',dataKey:'cycleTime',stroke:C.purple,strokeWidth:2,dot:{fill:C.purple,r:4},name:'cycleTime'})
          )
        ),
        e('div',{style:{display:'flex',gap:20,marginTop:12}},
          e('span',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.muted}},e('span',{style:{width:12,height:3,borderRadius:2,background:C.accent,display:'inline-block'}}),' Lead time'),
          e('span',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.muted}},e('span',{style:{width:12,height:3,borderRadius:2,background:C.purple,display:'inline-block'}}),' Cycle time')
        )
      ),
      // Interpretation
      e(Card,{style:{marginBottom:20}},
        e(SectionHeader,{title:'What the data is telling you',sub:'Interpretation — not just numbers, but the story behind them'}),
        e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          insights.map((ins,i)=>{
            const color=ins.type==='positive'?C.accent:ins.type==='warn'?C.warn:C.danger;
            const icon=ins.type==='positive'?'✓':ins.type==='warn'?'⚠':'✕';
            return e('div',{key:i,style:{display:'flex',gap:12,padding:'12px 14px',background:color+'10',borderRadius:8,border:`1px solid ${color}25`}},
              e('span',{style:{color,fontSize:14,marginTop:1,flexShrink:0}},icon),
              e('span',{style:{fontSize:13,color:C.text,lineHeight:1.6}},ins.text)
            );
          })
        )
      ),
      // Next steps
      e(Card,{style:{marginBottom: bugs.length>0?20:0}},
        e(SectionHeader,{title:'Suggested next steps',sub:'Practical actions based on your metrics — not generic advice'}),
        e('div',{style:{display:'flex',flexDirection:'column',gap:12}},
          steps.map((step,i)=>
            e('div',{key:i,style:{display:'flex',gap:14,paddingBottom:i<steps.length-1?12:0,borderBottom:i<steps.length-1?`1px solid ${C.border}`:'none'}},
              e('div',{style:{width:24,height:24,borderRadius:'50%',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:C.accent,flexShrink:0,marginTop:1}},i+1),
              e('div',null,
                e('div',{style:{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}},step.action),
                e('div',{style:{fontSize:13,color:C.sub,lineHeight:1.6}},step.detail)
              )
            )
          )
        )
      ),
      // Bug details
      bugs.length>0 && e(Card,null,
        e(SectionHeader,{title:'Escaped bugs this month',sub:'Production bugs linked to your work — from Fact_Bug_Reports'}),
        bugs.map(bug=>
          e('div',{key:bug.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}},
            e('div',{style:{fontSize:13,color:C.text}},`${bug.id} · ${bug.linkedIssue}`),
            e('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
              e(Badge,{text:bug.severity,color:bug.severity==='high'?C.danger:bug.severity==='medium'?C.warn:C.muted}),
              e(Badge,{text:bug.rootCause,color:C.info}),
              e(Badge,{text:bug.status,color:bug.status==='Open'?C.danger:C.accent})
            )
          )
        )
      )
    )
  );
}

// ── Manager View ──────────────────────────────────────────────────────────────
function ManagerView() {
  const [selectedMonth, setSelectedMonth] = useState('2026-04');
  const monthData = MANAGER_SUMMARY.filter(m => m.month === selectedMonth);
  const barData = monthData.map(m => ({ manager:m.manager.split(' ')[0], leadTime:m.avgLeadTime, cycleTime:m.avgCycleTime, bugRate:m.avgBugRate }));
  const e = React.createElement;
  const signalCfg = { 'Healthy flow':{ color:C.accent,icon:'✦' }, 'Watch bottlenecks':{ color:C.warn,icon:'⚠' } };

  return e('div', null,
    e('div',{style:{display:'flex',gap:12,marginBottom:28}},
      e('select',{value:selectedMonth,onChange:ev=>setSelectedMonth(ev.target.value),style:{background:C.surface,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontSize:14,cursor:'pointer'}},
        Object.entries(MONTH_LABELS).map(([k,v])=>e('option',{key:k,value:k},v))
      )
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16,marginBottom:28}},
      monthData.map(m=>{
        const sig = signalCfg[m.signal] || { color:C.warn, icon:'⚠' };
        return e(Card,{key:m.managerId},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}},
            e('div',null,
              e('div',{style:{fontSize:15,fontWeight:600,color:C.text}},m.manager),
              e('div',{style:{fontSize:12,color:C.muted,marginTop:2}},`Team size: ${m.teamSize} developers`)
            ),
            e(Badge,{text:`${sig.icon}  ${m.signal}`,color:sig.color})
          ),
          e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}},
            [
              { label:'Lead time', val:`${m.avgLeadTime.toFixed(2)}d`, good:m.avgLeadTime<4 },
              { label:'Cycle time', val:`${m.avgCycleTime.toFixed(2)}d`, good:m.avgCycleTime<5 },
              { label:'Bug rate', val:`${(m.avgBugRate*100).toFixed(0)}%`, good:m.avgBugRate===0 },
            ].map(stat=>
              e('div',{key:stat.label,style:{textAlign:'center',background:C.bg,borderRadius:8,padding:'10px 6px'}},
                e('div',{style:{fontSize:10,color:C.muted,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}},stat.label),
                e('div',{style:{fontSize:18,fontWeight:600,color:stat.good?C.accent:C.warn,fontFamily:"'DM Mono',monospace"}},stat.val)
              )
            )
          )
        );
      })
    ),
    e(Card,{style:{marginBottom:16}},
      e(SectionHeader,{title:'Team comparison',sub:`Lead time vs cycle time — ${MONTH_LABELS[selectedMonth]}`}),
      e(ResponsiveContainer,{width:'100%',height:200},
        e(BarChart,{data:barData,margin:{top:4,right:8,bottom:0,left:-20}},
          e(CartesianGrid,{stroke:C.border,strokeDasharray:'3 3',vertical:false}),
          e(XAxis,{dataKey:'manager',tick:{fill:C.muted,fontSize:12}}),
          e(YAxis,{tick:{fill:C.muted,fontSize:11},unit:'d'}),
          e(Tooltip,{contentStyle:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12},formatter:(v,n)=>[`${v.toFixed(2)} days`,n==='leadTime'?'Avg lead time':'Avg cycle time']}),
          e(Bar,{dataKey:'leadTime',fill:C.accent,radius:[4,4,0,0],name:'leadTime',barSize:24}),
          e(Bar,{dataKey:'cycleTime',fill:C.purple,radius:[4,4,0,0],name:'cycleTime',barSize:24})
        )
      ),
      e('div',{style:{display:'flex',gap:20,marginTop:12}},
        e('span',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.muted}},e('span',{style:{width:12,height:12,borderRadius:3,background:C.accent,display:'inline-block'}}),' Lead time'),
        e('span',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.muted}},e('span',{style:{width:12,height:12,borderRadius:3,background:C.purple,display:'inline-block'}}),' Cycle time')
      )
    ),
    monthData.some(m=>m.managerId==='MGR-03'&&m.avgCycleTime>5) &&
      e('div',{style:{padding:'14px 18px',borderRadius:10,background:C.warn+'10',border:`1px solid ${C.warn}30`,fontSize:13,color:C.text,lineHeight:1.6}},
        e('span',{style:{color:C.warn,fontWeight:600}},'⚠ Attention — Mobile Growth: '),
        `Cycle time is ${monthData.find(m=>m.managerId==='MGR-03').avgCycleTime.toFixed(1)} days — above the 5-day threshold. Check if tickets are scoped too large or if there are review delays compounding work-in-progress.`
      )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('ic');
  const e = React.createElement;
  return e('div',{style:{minHeight:'100vh',background:C.bg,fontFamily:"'DM Sans',system-ui,sans-serif",color:C.text}},
    // Nav
    e('div',{style:{borderBottom:`1px solid ${C.border}`,padding:'0 32px'}},
      e('div',{style:{maxWidth:960,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:60}},
        e('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
          e('span',{style:{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:600,color:C.accent,letterSpacing:'-0.02em'}},'DevPulse'),
          e('span',{style:{fontSize:12,color:C.muted}},'Developer Productivity MVP')
        ),
        e('div',{style:{display:'flex',gap:4}},
          [['ic','Individual View'],['manager','Manager View']].map(([id,label])=>
            e('button',{key:id,onClick:()=>setTab(id),style:{padding:'6px 16px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontFamily:'inherit',background:tab===id?C.dim:'transparent',color:tab===id?C.text:C.muted,transition:'all 0.15s'}},label)
          )
        )
      )
    ),
    // Content
    e('div',{style:{maxWidth:960,margin:'0 auto',padding:'32px 32px 64px'}},
      e('div',{style:{marginBottom:28}},
        e('h1',{style:{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:300,color:C.text,margin:0,letterSpacing:'-0.02em'}},
          tab==='ic'?'Your productivity snapshot':'Team health overview'
        ),
        e('p',{style:{fontSize:14,color:C.muted,marginTop:8}},
          tab==='ic'?'Understand your 5 metrics, read the story behind them, and see concrete next steps.':'A high-level view of delivery health across all three engineering teams.'
        )
      ),
      tab==='ic'?e(ICView,null):e(ManagerView,null)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
