<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DevPulse — Developer Productivity MVP</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0E0F11;color:#E8EAF0;font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
select{appearance:none;-webkit-appearance:none;outline:none;cursor:pointer}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

.nav{border-bottom:1px solid #252830;padding:0 32px;position:sticky;top:0;background:#0E0F11;z-index:10}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px}
.logo{font-size:21px;font-weight:700;color:#6EE7B7;letter-spacing:-0.02em}
.logo-sub{font-size:12px;color:#6B7280;margin-left:8px;font-weight:400}
.tab-group{display:flex;gap:4px}
.tab{padding:6px 16px;border-radius:8px;background:transparent;color:#6B7280;font-size:13px;transition:all .15s}
.tab.active{background:#353840;color:#E8EAF0}
.main{max-width:960px;margin:0 auto;padding:32px 32px 64px}
.page-title{font-size:26px;font-weight:300;color:#E8EAF0;letter-spacing:-0.02em;margin-bottom:8px}
.page-sub{font-size:13px;color:#6B7280;margin-bottom:28px}
.controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#6B7280;pointer-events:none;font-size:11px}
select.ctrl{background:#16181C;color:#E8EAF0;border:1px solid #252830;border-radius:8px;padding:8px 32px 8px 14px;font-size:13px;font-family:inherit}
.card{background:#16181C;border:1px solid #252830;border-radius:12px;padding:20px 24px;margin-bottom:16px}
.dev-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.avatar{width:46px;height:46px;border-radius:50%;background:#353840;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#6EE7B7;flex-shrink:0}
.dev-name{font-size:17px;font-weight:600;color:#E8EAF0}
.dev-sub{font-size:12px;color:#9CA3AF;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:16px}
.metric-tile{background:#0E0F11;border:1px solid #252830;border-radius:10px;padding:15px 16px}
.metric-label{font-size:10px;color:#6B7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:700;font-family:'Courier New',Courier,monospace;line-height:1;margin-bottom:4px}
.metric-unit{font-size:13px;color:#6B7280;margin-left:3px;font-weight:400}
.metric-sub{font-size:11px;color:#9CA3AF;margin-bottom:8px}
.metric-explain{font-size:11px;color:#6B7280;line-height:1.5;border-top:1px solid #252830;padding-top:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sec-title{font-size:13px;font-weight:600;color:#E8EAF0;margin-bottom:4px}
.sec-sub{font-size:12px;color:#6B7280;margin-bottom:16px}
.insight{display:flex;gap:12px;padding:12px 14px;border-radius:8px;margin-bottom:8px}
.insight:last-child{margin-bottom:0}
.insight-icon{font-size:13px;margin-top:2px;flex-shrink:0}
.insight-text{font-size:13px;color:#E8EAF0;line-height:1.6}
.step{display:flex;gap:14px;padding-bottom:14px;border-bottom:1px solid #252830}
.step:last-child{border-bottom:none;padding-bottom:0}
.step+.step{padding-top:14px}
.step-num{width:24px;height:24px;border-radius:50%;background:#353840;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6EE7B7;flex-shrink:0;margin-top:1px}
.step-action{font-size:13px;font-weight:600;color:#E8EAF0;margin-bottom:4px}
.step-detail{font-size:13px;color:#9CA3AF;line-height:1.6}
.bug-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #252830;flex-wrap:wrap;gap:8px}
.bug-row:last-child{border-bottom:none}
.bug-id{font-size:13px;color:#E8EAF0}
.bug-badges{display:flex;gap:6px;flex-wrap:wrap}
.mgr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.mgr-card{background:#16181C;border:1px solid #252830;border-radius:12px;padding:20px 22px}
.mgr-name{font-size:15px;font-weight:600;color:#E8EAF0}
.mgr-sub{font-size:12px;color:#6B7280;margin-top:2px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.stat-box{text-align:center;background:#0E0F11;border-radius:8px;padding:10px 4px}
.stat-box-label{font-size:9px;color:#6B7280;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.stat-box-val{font-size:18px;font-weight:700;font-family:'Courier New',Courier,monospace}
.callout{padding:14px 18px;border-radius:10px;font-size:13px;line-height:1.6;margin-top:4px}
.legend{display:flex;gap:20px;margin-top:12px}
.legend-item{display:flex;align-items:center;font-size:12px;color:#6B7280}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.leg-line{width:20px;height:3px;border-radius:2px;display:inline-block;margin-right:6px}
.hidden{display:none!important}
.chart-tooltip{position:fixed;background:#16181C;border:1px solid #353840;border-radius:8px;padding:8px 12px;font-size:12px;color:#E8EAF0;pointer-events:none;display:none;z-index:999}
</style>
</head>

// ── Colors & config ────────────────────────────────────────────────────────
var CA='#6EE7B7',CW='#FCD34D',CD='#F87171',CI='#93C5FD',CP='#A78BFA',CM='#6B7280';
var PAT={'Healthy flow':{c:CA,i:'✦'},'Quality watch':{c:CW,i:'⚠'},'Needs review':{c:CD,i:'↑'}};

// ── Helpers ────────────────────────────────────────────────────────────────
function getM(d,m){return METRICS.find(function(x){return x.devId===d&&x.month===m})||null}
function getPRs(d,m){return PRS.filter(function(x){return x.devId===d&&x.month===m})}
function getBugs(d,m){return BUGS.filter(function(x){return x.devId===d&&x.month===m})}
function getHist(d){return METRICS.filter(function(x){return x.devId===d}).sort(function(a,b){return a.month<b.month?-1:1})}
function avg(arr,fn){return arr.length?arr.reduce(function(s,x){return s+fn(x)},0)/arr.length:0}
function badge(txt,col){return '<span class="badge" style="background:'+col+'18;border:1px solid '+col+'40;color:'+col+'">'+txt+'</span>'}

}

// ── Interpret ──────────────────────────────────────────────────────────────
function interpret(m,prs,bugs){
  var ins=[],rw=avg(prs,function(p){return p.rw}),ls=avg(prs,function(p){return p.lines});
  if(m.bugRate===0&&m.lt<=3.5&&m.ct<=4.5)
    ins.push({t:'positive',tx:'Zero escaped bugs with fast delivery — this is the ideal combination. Keep PR sizes manageable to sustain it.'});
  else if(m.pat==='Healthy flow')
    ins.push({t:'positive',tx:'Your delivery flow is healthy this month — work is moving from start to production without major blockages.'});
  if(m.lt>4)
    ins.push({t:'warn',tx:'Lead time of '+m.lt.toFixed(1)+' days means changes take a while to reach users after the PR opens. There may be CI queue or deployment window delays after merge.'});
  if(m.ct>5)
    ins.push({t:'warn',tx:'Cycle time of '+m.ct.toFixed(1)+' days suggests tickets are staying in-progress longer than ideal. Breaking stories into smaller tasks often helps.'});
  if(rw>20)
    ins.push({t:'warn',tx:'PRs are waiting ~'+Math.round(rw)+'h for a first review on average. This bottleneck happens before CI even starts — it quietly extends your lead time.'});
  if(ls>500)
    ins.push({t:'warn',tx:'PRs average '+Math.round(ls)+' lines changed. Large diffs slow reviewers and increase missed-bug risk. Aim for under 400 lines per PR.'});
  if(m.bugRate>0){
    var causes=[...new Set(bugs.map(function(b){return b.cause}))].join(', ');
    ins.push({t:'danger',tx:m.escapedBugs+' bug'+(m.escapedBugs>1?'s':'')+' escaped to production (root cause: '+causes+'). Bug rate is '+m.bugRate+' — worth investigating before it compounds.'});
  }
  return ins;
}
function getSteps(m,prs){
  var steps=[],rw=avg(prs,function(p){return p.rw}),ls=avg(prs,function(p){return p.lines});
  if(rw>20)steps.push({a:'Tag reviewers immediately when you open a PR',d:'Your average review wait is '+Math.round(rw)+'h. A quick message to your reviewer cuts this wait in half — don\'t wait for them to notice.'});
  if(ls>400)steps.push({a:'Split large PRs before submitting',d:'PRs average '+Math.round(ls)+' lines. Try splitting by layer: data model, API, then UI. Smaller PRs merge faster and get sharper feedback.'});
  if(m.bugRate>0)steps.push({a:'Do a self-review before tagging reviewers',d:'Walk through your diff with fresh eyes — checking the edge cases that caused past bugs only takes 5 minutes and avoids a production incident.'});
  if(m.lt>4&&steps.length<3)steps.push({a:'Investigate the post-merge delay',d:'Lead time is '+m.lt.toFixed(1)+' days but cycle time is '+m.ct.toFixed(1)+' days. The gap suggests CI queue or deployment window delays — worth discussing with your team.'});
  if(steps.length===0){
    steps.push({a:'Keep the momentum',d:'Your metrics are solid this month. Help a teammate who might be struggling with review delays or large PR sizes — your workflow is worth sharing.'});
    steps.push({a:'Document your testing approach',d:'Zero escaped bugs this month is a quality signal worth formalising. Write down the quick checks you do before merging so the team benefits.'});
  }
  return steps.slice(0,3);
}

// ── SVG Charts ─────────────────────────────────────────────────────────────
function trendChart(hist){
  var W=780,H=155,pl=42,pr=16,pt=14,pb=30,cw=W-pl-pr,ch=H-pt-pb;
  var maxY=Math.max.apply(null,hist.map(function(h){return Math.max(h.lt,h.ct)}));
  maxY=Math.ceil(maxY)+1;
  var n=hist.length,xStep=n>1?cw/(n-1):cw/2;
  function px(i){return pl+(n>1?i*xStep:cw/2)}
  function py(v){return pt+ch-(v/maxY)*ch}
  var grid='';
  for(var v=0;v<=maxY;v+=2){
    var y=py(v);
    grid+='<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#252830" stroke-dasharray="4 4"/><text x="'+(pl-6)+'" y="'+(y+4)+'" fill="#6B7280" font-size="10" text-anchor="end">'+v+'d</text>';
  }
  var ltP='',ctP='',ltD='',ctD='',xL='';
  for(var i=0;i<hist.length;i++){
    var h=hist[i],x=px(i),lty=py(h.lt),cty=py(h.ct),ml=h.month==='2026-03'?'Mar':'Apr';
    ltP+=(i?'L':'M')+x+','+lty+' ';
    ctP+=(i?'L':'M')+x+','+cty+' ';
    ltD+='<circle cx="'+x+'" cy="'+lty+'" r="5" fill="'+CA+'" data-tip="Lead time: '+h.lt.toFixed(2)+'d ('+ml+')"/>';
    ctD+='<circle cx="'+x+'" cy="'+cty+'" r="5" fill="'+CP+'" data-tip="Cycle time: '+h.ct.toFixed(2)+'d ('+ml+')"/>';
    xL+='<text x="'+x+'" y="'+(H-6)+'" fill="#6B7280" font-size="10" text-anchor="middle">'+ml+'</text>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:160px">'+grid+xL+'<path d="'+ltP+'" fill="none" stroke="'+CA+'" stroke-width="2.5"/><path d="'+ctP+'" fill="none" stroke="'+CP+'" stroke-width="2.5"/>'+ltD+ctD+'</svg>';
}

function barChart(data){
  var W=700,H=170,pl=42,pr=16,pt=14,pb=34,cw=W-pl-pr,ch=H-pt-pb;
  var maxY=Math.max.apply(null,data.map(function(d){return Math.max(d.lt,d.ct)}));
  maxY=Math.ceil(maxY)+1;
  var n=data.length,gw=cw/n,bw=Math.min(gw*0.28,22),gap=4;
  var grid='';
  for(var v=0;v<=maxY;v+=2){
    var y=pt+ch-(v/maxY)*ch;
    grid+='<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#252830" stroke-dasharray="4 4"/><text x="'+(pl-6)+'" y="'+(y+4)+'" fill="#6B7280" font-size="10" text-anchor="end">'+v+'d</text>';
  }
  var bars='';
  for(var i=0;i<data.length;i++){
    var d=data[i],cx=pl+i*gw+gw/2;
    var x1=cx-bw-gap/2,x2=cx+gap/2;
    var h1=(d.lt/maxY)*ch,h2=(d.ct/maxY)*ch;
    var y1=pt+ch-h1,y2=pt+ch-h2;
    bars+='<rect x="'+x1+'" y="'+y1+'" width="'+bw+'" height="'+h1+'" fill="'+CA+'" rx="3" data-tip="Lead time: '+d.lt.toFixed(2)+'d"/>';
    bars+='<rect x="'+x2+'" y="'+y2+'" width="'+bw+'" height="'+h2+'" fill="'+CP+'" rx="3" data-tip="Cycle time: '+d.ct.toFixed(2)+'d"/>';
    bars+='<text x="'+cx+'" y="'+(H-8)+'" fill="#6B7280" font-size="11" text-anchor="middle">'+d.label+'</text>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:180px">'+grid+bars+'</svg>';
}

// ── Render IC ──────────────────────────────────────────────────────────────
function renderIC(){
  var devId=document.getElementById('dev-select').value;
  var month=document.getElementById('month-select').value;
  var dev=DEVS[devId],m=getM(devId,month),prs=getPRs(devId,month),bugs=getBugs(devId,month);
  if(!m){document.getElementById('ic-content').innerHTML='<div class="card" style="color:#6B7280;text-align:center;padding:40px">No data.</div>';return;}
  var hist=getHist(devId),pat=PAT[m.pat]||PAT['Healthy flow'];
  var rw=prs.length?avg(prs,function(p){return p.rw}).toFixed(1):'-';
  var ls=prs.length?Math.round(avg(prs,function(p){return p.lines})):'-';
  var ins=interpret(m,prs,bugs),steps=getSteps(m,prs);
  var mLabel=month==='2026-03'?'March 2026':'April 2026';
  var sevCol=function(s){return s==='high'?CD:s==='medium'?CW:CM};

  var html='';

  // Header
  html+='<div class="card dev-header"><div style="display:flex;align-items:center;gap:14px"><div class="avatar">'+dev.name.split(' ').map(function(n){return n[0]}).join('')+'</div><div><div class="dev-name">'+dev.name+'</div><div class="dev-sub">'+dev.level+' &middot; '+dev.team+' &middot; '+dev.service+' &middot; '+dev.manager+'</div></div></div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;color:#6B7280">'+mLabel+'</span>'+badge(pat.i+'&nbsp;&nbsp;'+m.pat,pat.c)+'</div></div>';

  // 5 metrics
  html+='<div class="sec-title" style="margin-bottom:4px">The 5 metrics this month</div><div class="sec-sub">Calculated from Fact_Pull_Requests &middot; Fact_Jira_Issues &middot; Fact_CI_Deployments &middot; Fact_Bug_Reports</div>';
  html+='<div class="metric-grid">';
  html+=tile('Lead Time for Changes',m.lt.toFixed(1),'days','PR open &rarr; prod deployment',m.lt>4?CW:CA,'Avg lead_time_days from successful prod deployments. How long a change takes to reach users once the PR is opened.');
  html+=tile('Cycle Time',m.ct.toFixed(1),'days','In Progress &rarr; Done',m.ct>5.5?CW:CA,'Avg cycle_time_days from Jira issues completed this month. Shows how fast active development moves.');
  html+=tile('PR Throughput',m.mergedPRs,'PRs','Merged this month',CI,'Count of merged pull requests. Useful as an activity signal — best read alongside quality and speed metrics.');
  html+=tile('Deploy Frequency',m.prodDeploys,'deploys','Successful prod releases',CI,'Count of successful production deployments. More frequent safe releases indicate a healthier delivery loop.');
  html+=tile('Bug Rate',m.bugRate.toFixed(1),'',m.escapedBugs+' escaped / '+m.issuesDone+' done',m.bugRate>0?CD:CA,'Escaped prod bugs &divide; issues completed this month. Shows whether delivery speed is hurting quality.');
  html+='</div>';

  // PR breakdown
  html+='<div class="two-col">';
  html+=tile('Avg Review Wait',rw,'hrs','PR open &rarr; first reviewer',parseFloat(rw)>20?CW:'#9CA3AF','How long code waits before a reviewer looks. A hidden bottleneck compressed inside lead time.');
  html+=tile('Avg PR Size',ls,'lines','Lines changed per PR',ls>500?CW:'#9CA3AF','Larger PRs slow reviewers and correlate with more escaped bugs. Aim to keep PRs under 400 lines.');
  html+='</div>';

  // Trend chart
  if(hist.length>1){
    html+='<div class="card"><div class="sec-title">Month-over-month trend</div><div class="sec-sub" style="margin-bottom:12px">Lead time vs cycle time across all months in the dataset</div>'+trendChart(hist)+'<div class="legend"><div class="legend-item"><span class="leg-line" style="background:'+CA+'"></span>Lead time</div><div class="legend-item"><span class="leg-line" style="background:'+CP+'"></span>Cycle time</div></div></div>';
  }

  // Interpretation
  html+='<div class="card"><div class="sec-title">What the data is telling you</div><div class="sec-sub">Not just numbers — the story behind them</div>';
  ins.forEach(function(x){
    var col=x.t==='positive'?CA:x.t==='warn'?CW:CD;
    var ic=x.t==='positive'?'✓':x.t==='warn'?'⚠':'✕';
    html+='<div class="insight" style="background:'+col+'10;border:1px solid '+col+'25"><span class="insight-icon" style="color:'+col+'">'+ic+'</span><span class="insight-text">'+x.tx+'</span></div>';
  });
  html+='</div>';

  // Next steps
  html+='<div class="card"'+(bugs.length>0?' style="margin-bottom:16px"':'')+'><div class="sec-title">Suggested next steps</div><div class="sec-sub">Specific actions based on your data — not generic advice</div>';
  steps.forEach(function(s,i){
    html+='<div class="step"><div class="step-num">'+(i+1)+'</div><div><div class="step-action">'+s.a+'</div><div class="step-detail">'+s.d+'</div></div></div>';
  });
  html+='</div>';

  // Bugs
  if(bugs.length>0){
    html+='<div class="card"><div class="sec-title">Escaped bugs this month</div><div class="sec-sub">Production bugs linked to your work — from Fact_Bug_Reports</div>';
    bugs.forEach(function(b){
      html+='<div class="bug-row"><span class="bug-id">'+b.id+' &middot; '+b.issue+'</span><div class="bug-badges">'+badge(b.sev,sevCol(b.sev))+badge(b.cause,CI)+badge(b.status,b.status==='Open'?CD:CA)+'</div></div>';
    });
    html+='</div>';
  }

  document.getElementById('ic-content').innerHTML=html;
  attachTips();
}

// ── Render Manager ─────────────────────────────────────────────────────────
function renderMgr(){
  var month=document.getElementById('mgr-month').value;
  var data=MGR.filter(function(m){return m.month===month});
  var mLabel=month==='2026-03'?'March 2026':'April 2026';
  var sigC={'Healthy flow':{c:CA,i:'✦'},'Watch bottlenecks':{c:CW,i:'⚠'}};

  var cards='';
  data.forEach(function(m){
    var sc=sigC[m.sig]||{c:CW,i:'⚠'};
    cards+='<div class="mgr-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"><div><div class="mgr-name">'+m.name+'</div><div class="mgr-sub">Team size: '+m.size+' developers</div></div>'+badge(sc.i+'&nbsp;&nbsp;'+m.sig,sc.c)+'</div><div class="stat-row"><div class="stat-box"><div class="stat-box-label">Lead time</div><div class="stat-box-val" style="color:'+(m.lt<=4?CA:CW)+'">'+m.lt.toFixed(2)+'d</div></div><div class="stat-box"><div class="stat-box-label">Cycle time</div><div class="stat-box-val" style="color:'+(m.ct<=5?CA:CW)+'">'+m.ct.toFixed(2)+'d</div></div><div class="stat-box"><div class="stat-box-label">Bug rate</div><div class="stat-box-val" style="color:'+(m.bug===0?CA:CW)+'">'+(m.bug*100).toFixed(0)+'%</div></div></div></div>';
  });

  var bdata=data.map(function(m){return{label:m.name.split(' ')[0],lt:m.lt,ct:m.ct}});
  var mobile=data.find(function(m){return m.id==='MGR-03'});
  var callout=mobile&&mobile.ct>5?'<div class="callout" style="background:'+CW+'10;border:1px solid '+CW+'30"><strong style="color:'+CW+'">⚠ Attention — Mobile Growth ('+mobile.name+'):</strong> Cycle time is '+mobile.ct.toFixed(1)+' days — above the 5-day threshold. Check if tickets are scoped too large or review delays are compounding work-in-progress.</div>':'';

  document.getElementById('mgr-content').innerHTML='<div class="mgr-grid">'+cards+'</div><div class="card"><div class="sec-title">Team comparison</div><div class="sec-sub" style="margin-bottom:12px">Lead time vs cycle time &middot; '+mLabel+'</div>'+barChart(bdata)+'<div class="legend"><div class="legend-item"><span class="leg-dot" style="background:'+CA+'"></span>Lead time</div><div class="legend-item"><span class="leg-dot" style="background:'+CP+'"></span>Cycle time</div></div></div>'+callout;
  attachTips();
}

// ── Tab switch ─────────────────────────────────────────────────────────────
function switchTab(t){
  document.getElementById('view-ic').classList.toggle('hidden',t!=='ic');
  document.getElementById('view-mgr').classList.toggle('hidden',t!=='mgr');
  document.getElementById('tab-ic').classList.toggle('active',t==='ic');
  document.getElementById('tab-mgr').classList.toggle('active',t==='mgr');
  if(t==='mgr')renderMgr();
}

// ── Tooltip ────────────────────────────────────────────────────────────────
function attachTips(){
  var tip=document.getElementById('tooltip');
  document.querySelectorAll('[data-tip]').forEach(function(el){
    el.style.cursor='default';
    el.onmouseenter=function(){tip.textContent=el.getAttribute('data-tip');tip.style.display='block'};
    el.onmousemove=function(e){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-36)+'px'};
    el.onmouseleave=function(){tip.style.display='none'};
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
renderIC();
</script>
